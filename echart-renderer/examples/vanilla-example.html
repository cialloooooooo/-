<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCloudRenderer 最小示例</title>
<style>
  body { margin: 0; background: #1a1b2e; height: 100vh; display: flex; flex-direction: column; }
  #toolbar { padding: 10px 16px; background: #232540; display: flex; gap: 10px; align-items: center; }
  #toolbar button, #toolbar select {
    background: #2a2d4a; border: 1px solid #3a3d5c; color: #e0e0f0;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  #toolbar button:hover { background: #6c5ce7; }
  #toolbar label { color: #8888aa; font-size: 12px; }
  #chart { flex: 1; }
  #progress { display: none; padding: 6px 16px; background: #232540; border-top: 1px solid #3a3d5c; }
  #progress.show { display: flex; align-items: center; gap: 10px; }
  #progress .bar { flex: 1; height: 4px; background: #2a2d4a; border-radius: 2px; overflow: hidden; }
  #progress .fill { height: 100%; width: 0; background: linear-gradient(90deg, #6c5ce7, #00cec9); transition: width .15s; }
  #progress .text { color: #8888aa; font-size: 12px; min-width: 80px; text-align: right; }
</style>
</head>
<body>
<div id="toolbar">
  <button id="loadSample">加载测试数据 (10万点)</button>
  <label>视图</label>
  <select id="viewMode">
    <option value="2d">2D</option>
    <option value="3d">3D</option>
  </select>
  <button id="exportBtn">导出图片</button>
  <span id="info" style="color:#8888aa;font-size:12px;margin-left:auto;">未加载</span>
</div>

<div id="chart"></div>

<div id="progress">
  <span class="text" id="progStatus">准备中...</span>
  <div class="bar"><div class="fill" id="progFill"></div></div>
  <span class="text" id="progText">0%</span>
</div>

<!-- 引入 ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>

<!-- 引入 PointCloudRenderer -->
<script src="../PointCloudRenderer.js" type="module"></script>

<!-- 使用 -->
<script type="module">
import { PointCloudRenderer } from '../PointCloudRenderer.js';

const chartDom = document.getElementById('chart');
const progCtn = document.getElementById('progress');
const progFill = document.getElementById('progFill');
const progText = document.getElementById('progText');
const progStatus = document.getElementById('progStatus');
const info = document.getElementById('info');

let renderer;

function initRenderer() {
  if (renderer) renderer.destroy();
  renderer = new PointCloudRenderer(chartDom);

  renderer.on('progress', ({ percent, text }) => {
    progCtn.classList.add('show');
    progFill.style.width = percent + '%';
    progText.textContent = percent + '%';
    progStatus.textContent = text;
  });

  renderer.on('load', ({ total, bounds }) => {
    progCtn.classList.remove('show');
    if (bounds) {
      info.innerHTML = `${total.toLocaleString()} 点 | X[${bounds.xMin.toFixed(1)},${bounds.xMax.toFixed(1)}] Z[${bounds.zMin.toFixed(1)},${bounds.zMax.toFixed(1)}]`;
    } else {
      info.textContent = `${total.toLocaleString()} 点`;
    }
  });

  renderer.on('error', ({ message }) => {
    progCtn.classList.remove('show');
    info.textContent = '错误: ' + message;
  });
}

// 生成测试数据
document.getElementById('loadSample').addEventListener('click', () => {
  initRenderer();
  info.textContent = '生成数据中...';

  setTimeout(() => {
    const count = 100000;
    const points = [];
    for (let i = 0; i < count; i++) {
      const t = Math.random() * Math.PI * 2;
      const r = Math.random() * 10;
      const x = r * Math.cos(t);
      const y = r * Math.sin(t);
      const z = Math.sin(x * 0.5) * Math.cos(y * 0.5) * 3 + (Math.random() - 0.5) * 0.5;
      points.push([x, y, z]);
    }
    renderer.loadPoints(points).catch(console.error);
  }, 50);
});

// 切换模式
document.getElementById('viewMode').addEventListener('change', () => {
  if (renderer) renderer.setMode(document.getElementById('viewMode').value);
});

// 导出
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!renderer) return;
  const url = renderer.getDataURL({ pixelRatio: 2 });
  const a = document.createElement('a');
  a.download = 'pointcloud.png';
  a.href = url;
  a.click();
});
</script>
</body>
</html>
