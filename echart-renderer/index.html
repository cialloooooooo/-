<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYZ 点云渲染工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1b2e;
  --surface: #232540;
  --surface2: #2a2d4a;
  --border: #3a3d5c;
  --text: #e0e0f0;
  --text-dim: #8888aa;
  --primary: #6c5ce7;
  --primary-hover: #7c6cf7;
  --accent: #00cec9;
  --danger: #e17055;
  --radius: 8px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 600; }
header h1 span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-accent { background: var(--accent); color: #1a1b2e; }
.btn-accent:hover { opacity: .9; }

/* Upload area */
#uploadArea {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  margin: 20px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  transition: all .3s;
  min-height: 300px;
  flex: 1;
}
#uploadArea.dragover {
  border-color: var(--primary);
  background: rgba(108,92,231,.08);
}
#uploadArea .icon { font-size: 48px; margin-bottom: 16px; opacity: .6; }
#uploadArea h2 { font-size: 20px; margin-bottom: 8px; }
#uploadArea p { color: var(--text-dim); font-size: 14px; margin-bottom: 4px; }
#uploadArea .hint { font-size: 12px; color: var(--text-dim); margin-top: 16px; }
#uploadBtn { margin-top: 20px; }
#fileInput { display: none; }

/* Main layout (hidden initially) */
#mainLayout {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  flex-shrink: 0;
}
.toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.toolbar-group label {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
}
.toolbar-group select,
.toolbar-group input[type="range"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 4px 8px;
  font-size: 12px;
}
.toolbar-group select { cursor: pointer; }
.toolbar-group input[type="range"] { width: 80px; padding: 0; }
.toolbar-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
}
.toolbar .stats {
  font-size: 12px;
  color: var(--text-dim);
  margin-left: auto;
  white-space: nowrap;
}

/* Progress bar */
#progressContainer {
  display: none;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.progress-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 3px;
  transition: width .15s ease;
}
.progress-text {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 120px;
  text-align: right;
}
.progress-status {
  font-size: 12px;
  color: var(--text-dim);
}

/* Chart */
#chartContainer {
  flex: 1;
  position: relative;
  min-height: 0;
}
#chart { width: 100%; height: 100%; }

/* Loading overlay */
#loadingOverlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(26,27,46,.85);
  z-index: 10;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
#loadingOverlay.active { display: flex; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--surface2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loadingOverlay .loading-text { color: var(--text-dim); font-size: 14px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  opacity: 0;
  transition: all .3s;
  z-index: 100;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.error { border-color: var(--danger); }
.toast.success { border-color: var(--accent); }

/* Responsive */
@media (max-width: 768px) {
  .toolbar { gap: 8px; padding: 8px 12px; }
  .toolbar-group label { font-size: 11px; }
  .toolbar .stats { font-size: 11px; }
  header { padding: 10px 12px; }
  header h1 { font-size: 15px; }
}
</style>
</head>
<body>

<header>
  <h1>XYZ <span>点云渲染</span></h1>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="resetApp()">重新选择</button>
    <button class="btn btn-accent" id="exportBtn" disabled>导出图片</button>
  </div>
</header>

<!-- Upload area -->
<div id="uploadArea">
  <div class="icon">&#9763;</div>
  <h2>拖拽文件到此处</h2>
  <p>支持 .txt（每行 x y z）和 .json（数组格式）</p>
  <p class="hint">支持 50 万级以上点云，2D / 3D 模式渲染</p>
  <button class="btn btn-primary" id="uploadBtn">选择文件</button>
  <button class="btn btn-outline" id="sampleBtn" style="margin-top:8px">生成测试数据（10万点）</button>
  <input type="file" id="fileInput" accept=".txt,.json">
</div>

<!-- Main layout -->
<div id="mainLayout">
  <div class="toolbar">
    <div class="toolbar-group">
      <label>视图</label>
      <select id="viewMode">
        <option value="2d">2D (Z → 颜色)</option>
        <option value="3d">3D</option>
      </select>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <label>点大小</label>
      <input type="range" id="pointSize" min="1" max="10" value="3" step="0.5">
      <span id="pointSizeVal" style="font-size:12px;color:var(--text-dim);min-width:20px">3</span>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <label>颜色</label>
      <select id="colorScheme">
        <option value="spectral">光谱</option>
        <option value="cool">冷色</option>
        <option value="warm">暖色</option>
        <option value="viridis">翠绿</option>
        <option value="greyscale">灰度</option>
      </select>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group" id="rotateGroup" style="display:none">
      <label>自动旋转</label>
      <input type="checkbox" id="autoRotate">
    </div>
    <div class="toolbar-sep" id="rotateSep" style="display:none"></div>
    <div class="toolbar-group">
      <label>采样</label>
      <select id="sampling">
        <option value="none">无</option>
        <option value="lttb" selected>LTTB</option>
        <option value="average">平均</option>
      </select>
    </div>
    <div class="stats" id="statsBar">未加载数据</div>
  </div>

  <!-- Progress bar -->
  <div id="progressContainer">
    <div class="progress-row">
      <span class="progress-status" id="progressStatus">处理中...</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span class="progress-text" id="progressText">0%</span>
    </div>
  </div>

  <!-- Chart -->
  <div id="chartContainer">
    <div id="chart"></div>
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <span class="loading-text" id="loadingText">渲染中...</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import { PointCloudRenderer } from './PointCloudRenderer.js';

// ============================================================
// DOM refs
// ============================================================
const $ = (id) => document.getElementById(id);
const uploadArea    = $('uploadArea');
const fileInput     = $('fileInput');
const mainLayout    = $('mainLayout');
const chartDom      = $('chart');
const progressCtn   = $('progressContainer');
const progressFill  = $('progressFill');
const progressText  = $('progressText');
const progressStat  = $('progressStatus');
const statsBar      = $('statsBar');
const loadingOvl    = $('loadingOverlay');
const loadingText   = $('loadingText');
const exportBtn     = $('exportBtn');
const toast         = $('toast');

// ============================================================
// Renderer
// ============================================================
let renderer = null;

// ============================================================
// Helpers
// ============================================================
let toastTimer = null;
function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = 'toast ' + (type || '');
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function showProgress(pct, text) {
  progressCtn.style.display = 'block';
  progressFill.style.width = Math.min(pct, 100) + '%';
  progressText.textContent = Math.min(pct, 100) + '%';
  if (text) progressStat.textContent = text;
}
function hideProgress() {
  progressCtn.style.display = 'none';
  progressFill.style.width = '0';
}

function showLoading(msg) { loadingText.textContent = msg || '渲染中...'; loadingOvl.classList.add('active'); }
function hideLoading() { loadingOvl.classList.remove('active'); }

function renderStats(count, bounds) {
  if (bounds) {
    statsBar.innerHTML = `
      点: <strong>${count.toLocaleString()}</strong> |
      X: [${bounds.xMin.toFixed(2)}, ${bounds.xMax.toFixed(2)}] |
      Y: [${bounds.yMin.toFixed(2)}, ${bounds.yMax.toFixed(2)}] |
      Z: [${bounds.zMin.toFixed(2)}, ${bounds.zMax.toFixed(2)}]
    `;
  } else {
    statsBar.textContent = `点: ${count.toLocaleString()}`;
  }
}

function switchUI(showMain) {
  uploadArea.style.display = showMain ? 'none' : 'flex';
  mainLayout.style.display = showMain ? 'flex' : 'none';
}

// ============================================================
// Main load handler
// ============================================================
function createRenderer() {
  if (renderer) renderer.destroy();
  renderer = new PointCloudRenderer(chartDom);

  renderer.on('progress', ({ percent, text }) => {
    showProgress(percent, text);
  });

  renderer.on('loadstart', () => {
    showProgress(0, '准备中...');
    showLoading('加载数据中...');
    exportBtn.disabled = true;
  });

  renderer.on('load', ({ total, bounds }) => {
    hideProgress();
    hideLoading();
    exportBtn.disabled = false;
    renderStats(total, bounds);
    showToast(`加载完成：${total.toLocaleString()} 个点`, 'success');
  });

  renderer.on('error', ({ message }) => {
    hideProgress();
    hideLoading();
    showToast(message, 'error');
  });

  renderer.on('warn', ({ message }) => {
    showToast(message, 'error');
  });

  renderer.on('modechange', ({ mode }) => {
    showLoading('切换视图...');
  });
}

async function loadAndRender(fileOrPoints) {
  createRenderer();
  switchUI(true);

  try {
    if (fileOrPoints instanceof File) {
      await renderer.loadFromFile(fileOrPoints);
    } else if (typeof fileOrPoints === 'string') {
      // text content
      await renderer.loadFromText(fileOrPoints, 'txt');
    } else if (Array.isArray(fileOrPoints)) {
      await renderer.loadPoints(fileOrPoints);
    }
  } catch (err) {
    // error already emitted via 'error' event, but handle direct throws too
    if (!renderer) return;
    hideProgress();
    hideLoading();
    showToast(err.message || '加载失败', 'error');
    console.error(err);
  }
}

// ============================================================
// UI — File upload
// ============================================================
$('uploadBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadAndRender(e.target.files[0]);
});

uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadAndRender(e.dataTransfer.files[0]);
});

// ============================================================
// UI — Sample data
// ============================================================
$('sampleBtn').addEventListener('click', () => {
  const count = 100000;
  showLoading(`生成 ${count.toLocaleString()} 个测试点...`);
  setTimeout(() => {
    const points = [];
    for (let i = 0; i < count; i++) {
      const t = Math.random() * Math.PI * 2;
      const r = Math.random() * 10;
      const x = r * Math.cos(t);
      const y = r * Math.sin(t);
      const z = Math.sin(x * 0.5) * Math.cos(y * 0.5) * 3 +
                (Math.random() - 0.5) * 0.5 +
                Math.sin(r * 0.8) * 1.5;
      points.push([x, y, z]);
    }
    loadAndRender(points);
  }, 50);
});

// ============================================================
// UI — Controls
// ============================================================
const viewMode   = $('viewMode');
const ptSize     = $('pointSize');
const ptSizeVal  = $('pointSizeVal');
const colorScm   = $('colorScheme');
const autoRot    = $('autoRotate');
const sampling   = $('sampling');
const rotateGrp  = $('rotateGroup');
const rotateSep  = $('rotateSep');

viewMode.addEventListener('change', () => {
  const is3d = viewMode.value === '3d';
  rotateGrp.style.display = is3d ? 'flex' : 'none';
  rotateSep.style.display = is3d ? 'block' : 'none';
  if (renderer) renderer.setMode(viewMode.value);
});

ptSize.addEventListener('input', () => {
  ptSizeVal.textContent = ptSize.value;
  if (renderer) renderer.setPointSize(ptSize.value);
});

colorScm.addEventListener('change', () => {
  if (renderer) renderer.setColorScheme(colorScm.value);
});

autoRot.addEventListener('change', () => {
  if (renderer) renderer.setAutoRotate(autoRot.checked);
});

sampling.addEventListener('change', () => {
  if (renderer) {
    renderer.setSampling(sampling.value);
    showToast('采样方式已更新', 'success');
  }
});

// ============================================================
// UI — Export
// ============================================================
exportBtn.addEventListener('click', () => {
  if (!renderer) return;
  try {
    const url = renderer.getDataURL({ pixelRatio: 2 });
    const link = document.createElement('a');
    link.download = `pointcloud_${new Date().toISOString().slice(0,19).replace(/[:-]/g,'')}.png`;
    link.href = url;
    link.click();
    showToast('图片已导出', 'success');
  } catch (e) {
    showToast('导出失败: ' + e.message, 'error');
  }
});

// ============================================================
// UI — Reset
// ============================================================
window.resetApp = () => {
  if (renderer) { renderer.destroy(); renderer = null; }
  exportBtn.disabled = true;
  switchUI(false);
  fileInput.value = '';
  hideProgress();
  hideLoading();
  showToast('已重置', 'success');
};
</script>
</body>
</html>
